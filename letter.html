<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,500;1,500;1,600&family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@500;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon-dark:#2b0f16;
    --maroon:#3d1520;
    --wine:#5c1f2e;
    --gold:#d4af7a;
    --gold-soft:#e8caa0;
    --rose:#e2a1a1;
    --paper:#f6ecdd;
    --paper-shadow:#e0cfae;
    --ink:#3a2620;
    --ink-soft:#6b4a3d;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    height:100dvh;
    width:100%;
    overflow:hidden;
    background: radial-gradient(ellipse at 50% 20%, var(--wine) 0%, var(--maroon) 45%, var(--maroon-dark) 100%);
    font-family:'Poppins', sans-serif;
    color:var(--paper);
  }

  .stage{
    position:relative;
    height:100vh;
    height:100dvh;
    width:100vw;
    overflow:hidden;
  }

  /* ---------- ambient floating hearts ---------- */
  .hearts-field{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:1;
  }
  .heart-particle{
    position:absolute;
    bottom:-10%;
    opacity:0;
    animation-name: floatUp;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
    color: var(--rose);
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg) scale(0.6); opacity:0; }
    10%{ opacity:0.55; }
    50%{ transform: translateY(-55vh) translateX(15px) rotate(15deg) scale(1); }
    90%{ opacity:0.35; }
    100%{ transform: translateY(-105vh) translateX(-10px) rotate(-10deg) scale(0.7); opacity:0; }
  }

  /* ---------- scene management ---------- */
  .scene{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:5;
    padding: 24px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.7s ease;
    text-align:center;
  }
  .scene.active{
    opacity:1;
    pointer-events:auto;
  }

  .eyebrow{
    font-family:'Poppins', sans-serif;
    letter-spacing:0.15em;
    font-size:0.8rem;
    color: var(--gold-soft);
    text-transform:uppercase;
    margin-bottom:14px;
    opacity:0.85;
  }

  /* ---------- scene 1 : heart names intro ---------- */
  #scene-intro .eyebrow{ margin-bottom: 30px; }

  .heart-names{
    position:relative;
    width: min(280px, 74vw);
    aspect-ratio: 200/180;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 40px;
  }
  .heart-outline{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:visible;
  }
  .heart-outline path{
    fill: rgba(226,161,161,0.06);
    stroke: var(--gold);
    stroke-width: 1.6;
    stroke-linejoin: round;
    stroke-dasharray: 620;
    stroke-dashoffset: 620;
    animation: drawHeart 1.8s ease forwards, pulseHeart 2.8s ease-in-out 1.8s infinite;
  }
  @keyframes drawHeart{
    to{ stroke-dashoffset: 0; }
  }
  @keyframes pulseHeart{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.03); }
  }
  .heart-outline{ transform-origin: 50% 50%; }

  .name{
    position:absolute;
    font-family:'Dancing Script', cursive;
    font-weight:700;
    color: var(--gold-soft);
    opacity:0;
    animation: nameFade 0.9s ease forwards;
    text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }
  .name-top{
    top: 30%;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    animation-delay: 1.9s;
  }
  .amp{
    position:absolute;
    top: 48%;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:1rem;
    color: var(--rose);
    opacity:0;
    animation: nameFade 0.9s ease forwards;
    animation-delay: 2.3s;
  }
  .name-bottom{
    top: 58%;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    animation-delay: 2.6s;
  }
  @keyframes nameFade{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .password-field{
    position:relative;
    width:100%;
    max-width:260px;
  }
  .password-field input{
    width:100%;
    background: rgba(246,236,221,0.06);
    border: 1px solid rgba(212,175,122,0.4);
    border-radius: 2px;
    padding: 16px 14px 8px;
    color: var(--paper);
    font-family:'Poppins', sans-serif;
    font-size:1rem;
    letter-spacing:0.2em;
    outline:none;
    text-align:center;
    transition: border-color 0.3s, background 0.3s;
  }
  .password-field input:focus{
    border-color: var(--gold);
    background: rgba(246,236,221,0.1);
  }
  .password-field label{
    position:absolute;
    left:50%;
    transform: translate(-50%,-50%);
    top:50%;
    color: rgba(232,202,160,0.6);
    font-size:0.9rem;
    pointer-events:none;
    transition: all 0.2s ease;
  }
  .password-field input:focus + label,
  .password-field input:not(:placeholder-shown) + label{
    top:8px;
    left:14px;
    transform: translate(0,0);
    font-size:0.65rem;
    color: var(--gold);
  }
  .password-field.shake{
    animation: shakeField 0.5s ease;
  }
  .password-field.shake input{
    border-color:#c0554f;
  }
  @keyframes shakeField{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-8px); }
    40%{ transform: translateX(8px); }
    60%{ transform: translateX(-6px); }
    80%{ transform: translateX(6px); }
  }
  .pw-error{
    margin-top:10px;
    font-size:0.78rem;
    color:#e08a84;
    opacity:0;
    height:0;
    transition: opacity 0.3s ease;
  }
  .pw-error.show{
    opacity:1;
  }

  .btn{
    margin-top: 34px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-soft);
    font-family:'Poppins', sans-serif;
    letter-spacing:0.08em;
    font-size:0.95rem;
    padding: 14px 42px;
    border-radius: 2px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition: color 0.4s ease;
  }
  .btn::before{
    content:'';
    position:absolute;
    inset:0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s ease;
    z-index:-1;
  }
  .btn:hover::before{ transform: scaleX(1); transform-origin:left; }
  .btn:hover{ color: var(--maroon-dark); }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn:disabled::before{ display:none; }

  /* ---------- scene 2 : envelope ---------- */
  #scene-envelope .eyebrow{ margin-bottom: 4px; }
  #scene-envelope .names-line{
    font-family:'Playfair Display', serif;
    font-style:italic;
    color: var(--gold-soft);
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    margin-bottom: 24px;
  }

  .envelope-wrap{
    position:relative;
    width: min(260px, 62vw, 40vh);
    aspect-ratio: 340/220;
    cursor:pointer;
    perspective: 900px;
    transform-origin: 50% 60%;
    transition: transform 0.6s cubic-bezier(.4,.1,.2,1) 0.85s;
  }
  .envelope-wrap.opened{
    transform: scale(0.82);
  }

  .envelope-back{
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 5px),
      linear-gradient(155deg, #6b2436, #4a1826 55%, #3a1220);
    border-radius:6px;
    box-shadow: 0 28px 70px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(212,175,122,0.25);
  }
  .envelope-back::after{
    content:'';
    position:absolute;
    inset:6px;
    border: 1px solid rgba(212,175,122,0.35);
    border-radius:3px;
    pointer-events:none;
  }

  /* folded side triangles for a realistic envelope look */
  .side-fold{
    position:absolute;
    top:0; bottom:0;
    width:50%;
    background: linear-gradient(160deg, rgba(212,175,122,0.14), rgba(0,0,0,0.18));
    z-index:3;
  }
  .side-fold.left{
    left:0;
    clip-path: polygon(0 0, 0 100%, 100% 50%);
  }
  .side-fold.right{
    right:0;
    clip-path: polygon(100% 0, 100% 100%, 0 50%);
  }

  .letter-inside{
    position:absolute;
    left:7%;
    right:7%;
    top:-8%;
    height:90%;
    background: var(--paper);
    border-radius:2px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    transform: translateY(0);
    transition: transform 1s cubic-bezier(.2,.9,.25,1);
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 16px;
  }
  .letter-inside .peek{
    font-family:'Playfair Display', serif;
    color: var(--ink-soft);
    font-size:0.85rem;
    opacity:0;
    transition: opacity 0.6s ease 0.5s;
  }
  .envelope-wrap.opened .letter-inside{
    transform: translateY(-72%);
  }
  .envelope-wrap.opened .letter-inside .peek{ opacity:1; }

  .flap{
    position:absolute;
    left:0; right:0; top:0;
    height:56%;
    background: linear-gradient(160deg, #7c2c3f, #591f2e 60%, #3a1220);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 0.9s cubic-bezier(.4,.1,.2,1);
    z-index:5;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .flap::after{
    content:'';
    position:absolute;
    left:8%; right:8%; top:6%;
    height:1px;
    background: rgba(212,175,122,0.4);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .flap-stamp{
    position:absolute;
    left:50%; top:14%;
    transform: translateX(-50%);
    font-size:1rem;
    color: var(--gold-soft);
    opacity:0.85;
    z-index:1;
    pointer-events:none;
  }
  .envelope-wrap.opened .flap{
    transform: rotateX(180deg);
    z-index:1;
  }

  .front-pocket{
    position:absolute;
    left:0; right:0; bottom:0; top:32%;
    background: linear-gradient(200deg, #7c2c3f, #4a1826);
    clip-path: polygon(0 100%, 100% 100%, 50% 18%);
    z-index:4;
    box-shadow: inset 0 12px 20px -12px rgba(0,0,0,0.5);
  }

  /* ---------- ribbon bow seal ---------- */
  .seal{
    position:absolute;
    left:50%; top:30%;
    width:70px; height:46px;
    transform: translate(-50%,-50%) scale(1);
    z-index:6;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1), opacity 0.5s ease;
  }
  .seal .ribbon-loop{
    position:absolute;
    top:0;
    width:34px; height:34px;
    background: linear-gradient(135deg, #e8caa0, #b5893f);
    box-shadow: 0 3px 8px rgba(0,0,0,0.35);
  }
  .seal .ribbon-loop.l{
    left:2px;
    border-radius: 60% 60% 60% 0%;
    transform: rotate(-25deg);
  }
  .seal .ribbon-loop.r{
    right:2px;
    border-radius: 60% 60% 0% 60%;
    transform: rotate(25deg);
  }
  .seal .ribbon-tail{
    position:absolute;
    bottom:-6px;
    width:10px; height:20px;
    background: linear-gradient(180deg, #d4af7a, #a5793a);
  }
  .seal .ribbon-tail.l{ left:22px; clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 75%, 0 100%); transform: rotate(-8deg); }
  .seal .ribbon-tail.r{ right:22px; clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 75%, 0 100%); transform: rotate(8deg); }
  .seal .knot{
    position:absolute;
    left:50%; top:50%;
    width:16px; height:16px;
    background: radial-gradient(circle at 35% 30%, #f0d9ae, #a5793a 75%);
    border-radius:50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    z-index:2;
  }
  .envelope-wrap.opened .seal{
    transform: translate(-50%,-50%) scale(0) rotate(50deg);
    opacity:0;
  }

  .hint{
    margin-top: 16px;
    font-size:0.8rem;
    color: rgba(232,202,160,0.6);
    letter-spacing:0.05em;
  }
  .envelope-wrap.opened ~ .hint{ opacity:0; }

  /* ---------- scene 3 : letter full ---------- */
  #scene-letter{
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    justify-content:flex-start;
    padding: 32px 20px 40px;
  }
  .letter-card{
    background: var(--paper);
    color: var(--ink);
    max-width: 520px;
    width:100%;
    margin: 0 auto;
    padding: 46px 34px 38px;
    border-radius: 3px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    position:relative;
  }
  .letter-card::before{
    content:'';
    position:absolute;
    inset:10px;
    border: 1px solid rgba(58,38,32,0.15);
    pointer-events:none;
  }
  .letter-heading{
    display:flex;
    justify-content:center;
    margin-bottom: 22px;
  }
  .heading-heart{
    position:relative;
    width: 100px;
    aspect-ratio: 200/180;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .heading-heart svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:visible;
  }
  .heading-heart svg path{
    fill: rgba(92,31,46,0.06);
    stroke: var(--wine);
    stroke-width: 1.6;
    stroke-linejoin: round;
  }
  .heading-heart .heart-name{
    position:relative;
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size: clamp(1.3rem, 4vw, 1.6rem);
    color: var(--wine);
    top: 8%;
  }
  .letter-heading[dir="rtl"]{
    text-align:right;
  }
  .letter-body{
    font-family:'Cormorant Garamond', serif;
    font-size: clamp(1.15rem, 2.8vw, 1.4rem);
    line-height:2.1;
    color: var(--ink);
    text-align:left;
  }
  .letter-body[dir="rtl"]{
    font-family:'Amiri', 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3vw, 1.55rem);
    line-height:2.3;
    text-align:right;
    direction:rtl;
    unicode-bidi:embed;
  }
  .letter-body .word{
    opacity:0;
    display:inline-block;
    margin-right:0.3em;
    animation: writeIn 0.5s forwards;
  }
  @keyframes writeIn{
    to{ opacity:1; }
  }
  .signature{
    margin-top: 30px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.15rem;
    color: var(--wine);
    text-align:right;
    opacity:0;
    animation: writeIn 0.8s forwards;
  }
  .signature[dir="rtl"]{
    font-family:'Amiri', 'Cormorant Garamond', serif;
    font-style:normal;
    text-align:left;
  }

  .gallery{
    display:flex;
    gap:16px;
    justify-content:center;
    margin-top:34px;
    flex-wrap:wrap;
    opacity:1;
  }
  .memory-item{
    width:130px;
    background: #fff;
    padding:8px 8px 22px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.3);
    transform: translateY(30px) scale(0.7) rotate(var(--r,0deg));
    border-radius:3px;
    opacity:0;
    animation: popIn 0.75s cubic-bezier(.34,1.56,.64,1) forwards;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .memory-item:hover{
    transform: translateY(0) scale(1.06) rotate(0deg);
    box-shadow: 0 16px 34px rgba(0,0,0,0.4);
    z-index:2;
  }
  .memory-item:nth-child(1){ --r:-7deg; }
  .memory-item:nth-child(2){ --r:5deg; }
  .memory-item:nth-child(3){ --r:-3deg; }
  .memory-item:nth-child(4){ --r:6deg; }
  @keyframes popIn{
    0%{ opacity:0; transform: translateY(30px) scale(0.6) rotate(var(--r,0deg)); }
    70%{ opacity:1; transform: translateY(-4px) scale(1.04) rotate(var(--r,0deg)); }
    100%{ opacity:1; transform: translateY(0) scale(1) rotate(var(--r,0deg)); }
  }
  .memory-item .media{
    width:100%;
    height:130px;
    display:block;
    border-radius:1px;
    overflow:hidden;
    background: linear-gradient(135deg, var(--rose), var(--wine));
  }
  .memory-item .media img,
  .memory-item .media video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .memory-item .media.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color: rgba(255,255,255,0.85);
    font-size:1.6rem;
  }
  .memory-item .cap{
    font-family:'Playfair Display', serif;
    font-size:0.65rem;
    color:#8a7562;
    text-align:center;
    margin-top:7px;
    display:block;
  }

  .replay{
    display:block;
    margin: 34px auto 0;
    background:none;
    border:none;
    color: var(--ink-soft);
    font-family:'Poppins', sans-serif;
    font-size:0.78rem;
    text-decoration:underline;
    cursor:pointer;
    opacity:0;
    animation: writeIn 1s forwards;
  }

  @media (prefers-reduced-motion: reduce){
    .heart-particle, .letter-body .word, .signature, .memory-item, .replay{ animation:none !important; opacity:1 !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="hearts-field" id="heartsField"></div>

  <!-- SCENE 1 : heart names intro -->
  <section class="scene active" id="scene-intro">
    <div class="eyebrow">You've got a letter</div>
    <div class="heart-names">
      <svg class="heart-outline" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,170 C40,120 10,80 10,50 C10,20 35,5 60,5 C80,5 95,20 100,40 C105,20 120,5 140,5 C165,5 190,20 190,50 C190,80 160,120 100,170 Z"/>
      </svg>
      <div class="name name-top">Ahmed</div>
      <div class="amp">&amp;</div>
      <div class="name name-bottom">Kenzy</div>
    </div>
    <div class="field password-field">
      <input type="password" id="passwordInput" placeholder=" " autocomplete="off">
      <label>Password</label>
    </div>
    <button class="btn" id="goEnvelope">Unlock</button>
    <div class="pw-error" id="pwError">Wrong password, try again</div>
  </section>

  <!-- SCENE 2 : envelope -->
  <section class="scene" id="scene-envelope">
    <div class="eyebrow">You've got a letter</div>
    <div class="names-line" id="namesLine"></div>
    <div class="envelope-wrap" id="envelope">
      <div class="envelope-back"></div>
      <div class="side-fold left"></div>
      <div class="side-fold right"></div>
      <div class="letter-inside"><span class="peek">✦</span></div>
      <div class="front-pocket"></div>
      <div class="flap">
        <span class="flap-stamp">♥</span>
      </div>
      <div class="seal">
        <div class="ribbon-loop l"></div>
        <div class="ribbon-loop r"></div>
        <div class="ribbon-tail l"></div>
        <div class="ribbon-tail r"></div>
        <div class="knot"></div>
      </div>
    </div>
    <div class="hint">Tap the ribbon to open it</div>
  </section>

  <!-- SCENE 3 : letter -->
  <section class="scene" id="scene-letter">
    <div class="letter-card">
      <div class="letter-heading" id="letterHeading"></div>
      <div class="letter-body" id="letterBody"></div>
      <div class="signature" id="letterSignature"></div>
      <div class="gallery">
        <!-- Photo 1 -->
        <div class="memory-item">
          <div class="media"><img src="1.jpg" alt=""></div>
          <span class="cap">First hello</span>
        </div>
        <!-- Photo 2 -->
        <div class="memory-item">
          <div class="media"><img src="2.jpg" alt=""></div>
          <span class="cap">Best times</span>
        </div>
        <!-- Video (5.mp4) -->
        <div class="memory-item">
          <div class="media"><video src="5.mp4" muted loop autoplay playsinline></video></div>
          <span class="cap">Our video</span>
        </div>
        <!-- Photo 4 -->
        <div class="memory-item">
          <div class="media"><img src="4.jpg" alt=""></div>
          <span class="cap">Just us two</span>
        </div>
      </div>
      <button class="replay" id="replayBtn">Open the envelope again ↺</button>
    </div>
  </section>
</div>

<script>
  // ---------- ambient hearts ----------
  const heartsField = document.getElementById('heartsField');
  const HEART_COUNT = 34;
  const symbols = ['♥','❤','♡'];
  for(let i=0;i<HEART_COUNT;i++){
    const el = document.createElement('span');
    el.className = 'heart-particle';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    const size = 10 + Math.random()*24;
    el.style.fontSize = size + 'px';
    el.style.left = (Math.random()*100) + '%';
    el.style.animationDuration = (6 + Math.random()*9) + 's';
    el.style.animationDelay = (Math.random()*10) + 's';
    heartsField.appendChild(el);
  }

  // ---------- scene switching ----------
  const FROM_NAME = 'Ahmed';
  const TO_NAME = 'Kenzy';

  const sceneIntro = document.getElementById('scene-intro');
  const sceneEnvelope = document.getElementById('scene-envelope');
  const sceneLetter = document.getElementById('scene-letter');

  const namesLine = document.getElementById('namesLine');
  const goEnvelope = document.getElementById('goEnvelope');
  const envelope = document.getElementById('envelope');
  const passwordInput = document.getElementById('passwordInput');
  const passwordField = document.querySelector('.password-field');
  const pwError = document.getElementById('pwError');
  const CORRECT_PASSWORD = 'love';

  function showScene(scene){
    [sceneIntro, sceneEnvelope, sceneLetter].forEach(s => s.classList.remove('active'));
    scene.classList.add('active');
  }

  function tryUnlock(){
    const value = passwordInput.value.trim().toLowerCase();
    if(value === CORRECT_PASSWORD){
      pwError.classList.remove('show');
      namesLine.textContent = `From ${FROM_NAME} to ${TO_NAME}`;
      envelope.classList.remove('opened');
      showScene(sceneEnvelope);
    } else {
      pwError.classList.add('show');
      passwordField.classList.remove('shake');
      void passwordField.offsetWidth; // restart shake animation
      passwordField.classList.add('shake');
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  goEnvelope.addEventListener('click', tryUnlock);
  passwordInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') tryUnlock();
  });

  envelope.addEventListener('click', () => {
    if(envelope.classList.contains('opened')) return;
    envelope.classList.add('opened');
    setTimeout(() => buildLetter(), 900);
  });

  function buildLetter(){
    const from = FROM_NAME;
    const to = TO_NAME;

    const headingEl = document.getElementById('letterHeading');
    headingEl.removeAttribute('dir');
    headingEl.innerHTML = `
      <div class="heading-heart">
        <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
          <path d="M100,170 C40,120 10,80 10,50 C10,20 35,5 60,5 C80,5 95,20 100,40 C105,20 120,5 140,5 C165,5 190,20 190,50 C190,80 160,120 100,170 Z"/>
        </svg>
        <span class="heart-name">${to}</span>
      </div>
    `;

    const message = `Rohy w hyaty, kolaha agmal haga ta'ryban. Einy shafetha, enty agmal w ara' haga shoftaha. W baheb kol haga fekky bgd, w bahebk hob, enty mahma thawly ttkhayleh msh htaarfy. Ana nefsy el waa't yaady, w teb'y maaya f nafs el makan, w ganby dyman. W afdal shayfek odami mngheir ma tghyby aan einy lahza, bgd. La'ny lma bashofek bartah, w eeiny w kol haga feya btrtah mogarad eny ashofek. Bahbek gedan, w baheb omek ashan gabtek, wallahi.`;

    const bodyEl = document.getElementById('letterBody');
    bodyEl.setAttribute('dir', 'ltr');
    bodyEl.innerHTML = '';
    const words = message.split(' ');
    words.forEach((w, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w;
      span.style.animationDelay = (i * 0.045) + 's';
      bodyEl.appendChild(span);
    });

    const sigEl = document.getElementById('letterSignature');
    sigEl.setAttribute('dir', 'ltr');
    sigEl.textContent = `Loving you always, ${from}`;
    sigEl.style.animationDelay = (words.length * 0.045 + 0.4) + 's';

    const galleryBaseDelay = words.length * 0.045 + 0.9;
    document.querySelectorAll('.memory-item').forEach((item, i) => {
      item.style.animation = 'none';
      void item.offsetWidth; // force reflow so the animation restarts on replay
      item.style.animation = '';
      item.style.animationDelay = (galleryBaseDelay + i * 0.16) + 's';
    });
    document.getElementById('replayBtn').style.animationDelay = (galleryBaseDelay + 0.9) + 's';

    showScene(sceneLetter);
  }

  document.getElementById('replayBtn').addEventListener('click', () => {
    envelope.classList.remove('opened');
    showScene(sceneEnvelope);
  });
</script>
</body>
</html>
